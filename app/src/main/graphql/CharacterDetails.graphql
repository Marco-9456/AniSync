query GetCharacterDetails($id: Int!) {
    Character(id: $id) {
        id
        name {
            full
            native
            userPreferred
        }
        image {
            large
        }
        description
        gender
        age
        dateOfBirth {
            year
            month
            day
        }
        bloodType
        favourites
        media(perPage: 25, sort: [POPULARITY_DESC]) {
            edges {
                node {
                    id
                    title {
                        userPreferred
                        romaji
                        english
                        native
                    }
                    coverImage {
                        large
                    }
                    type
                }
                voiceActors(language: JAPANESE, sort: [RELEVANCE, ID]) {
                    id
                    name {
                        full
                        native
                        userPreferred
                    }
                    image {
                        medium
                    }
                }
            }
        }
    }
}
