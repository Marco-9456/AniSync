mutation ToggleFavourite($animeId: Int, $mangaId: Int, $characterId: Int, $staffId: Int) {
  ToggleFavourite(animeId: $animeId, mangaId: $mangaId, characterId: $characterId, staffId: $staffId) {
    anime {
      nodes {
        id
        isFavourite
      }
    }
    characters {
      nodes {
        id
        isFavourite
      }
    }
    staff {
      nodes {
        id
        isFavourite
      }
    }
  }
}
