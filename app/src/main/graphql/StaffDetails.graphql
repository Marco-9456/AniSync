query GetStaffDetails($id: Int!, $page: Int = 1) {
    Staff(id: $id) {
        id
        name {
            full
            native
            userPreferred
            alternative
        }
        image {
            large
        }
        description(asHtml: true)
        gender
        age
        bloodType
        dateOfBirth {
            year
            month
            day
        }
        dateOfDeath {
            year
            month
            day
        }
        favourites
        isFavourite
        languageV2
        primaryOccupations
        yearsActive
        homeTown
        characterMedia(page: $page, sort: [START_DATE_DESC], perPage: 25) {
            pageInfo {
                hasNextPage
            }
            edges {
                characterRole
                node {
                    id
                    title {
                        userPreferred
                        romaji
                        english
                        native
                    }
                    coverImage {
                      medium
                      large
                      extraLarge
                    }
                    startDate {
                        year
                    }
                    type
                    popularity
                    averageScore
                    favourites
                    mediaListEntry {
                        id
                    }
                }
                characters {
                    id
                    name {
                        full
                        native
                        userPreferred
                    }
                    image {
                        medium
                    }
                }
            }
        }
    }
}