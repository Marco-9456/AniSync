query SearchMedia($search: String, $type: MediaType, $page: Int, $perPage: Int) {
  Page(page: $page, perPage: $perPage) {
    media(search: $search, sort: POPULARITY_DESC, type: $type) {
      id
      title {
        userPreferred
      }
      coverImage {
        extraLarge
      }
      status
      averageScore
      episodes
      chapters
      volumes
      type
    }
  }
}
