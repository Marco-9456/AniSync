query SearchMedia(
  $search: String, 
  $type: MediaType, 
  $page: Int, 
  $perPage: Int,
  $status: MediaStatus,
  $format: MediaFormat,
  $genre: String,
  $seasonYear: Int,
  $season: MediaSeason
) {
  Page(page: $page, perPage: $perPage) {
    media(
      search: $search, 
      sort: POPULARITY_DESC, 
      type: $type,
      status: $status,
      format: $format,
      genre: $genre,
      seasonYear: $seasonYear,
      season: $season
    ) {
      id
      title {
        userPreferred
      }
      coverImage {
        extraLarge
      }
      status
      averageScore
      episodes
      chapters
      volumes
      type
      format
      genres
    }
  }
}
