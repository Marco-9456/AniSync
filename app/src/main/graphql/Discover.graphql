query GetMediaBySort($sort: [MediaSort], $perPage: Int) {
  Page(perPage: $perPage) {
    media(sort: $sort, type: ANIME) {
      id
      title {
        userPreferred
      }
      coverImage {
        extraLarge
      }
    }
  }
}

query GetUpcomingMedia($perPage: Int, $status: MediaStatus) {
  Page(perPage: $perPage) {
    media(status: $status, type: ANIME, sort: [POPULARITY_DESC]) {
      id
      title {
        userPreferred
      }
      coverImage {
        extraLarge
      }
    }
  }
}
