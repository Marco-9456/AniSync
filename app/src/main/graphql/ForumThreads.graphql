query GetForumThreads(
  $page: Int = 1,
  $perPage: Int = 20,
  $categoryId: Int,
  $search: String,
  $sort: [ThreadSort] = [REPLIED_AT_DESC]
) {
  Page(page: $page, perPage: $perPage) {
    threads(categoryId: $categoryId, search: $search, sort: $sort) {
      id
      title
      body(asHtml: true)
      replyCount
      viewCount
      likeCount
      isLiked
      isSubscribed
      isLocked
      isSticky
      repliedAt
      replyCommentId
      createdAt
      user {
        id
        name
        avatar {
          large
        }
      }
      replyUser {
        name
        avatar {
          large
        }
      }
      categories {
        id
        name
      }
      mediaCategories {
        title {
          romaji
        }
        coverImage {
          medium
          large
          extraLarge
        }
      }
    }
    pageInfo {
      hasNextPage
      currentPage
    }
  }
}
