query GetUserLibrary($username: String!, $type: MediaType!) {
  MediaListCollection(userName: $username, type: $type) {
    user {
      id
      mediaListOptions {
        animeList { customLists }
        mangaList { customLists }
      }
    }
    lists {
      name
      entries {
        id
        media {
          id
          title {
            userPreferred
            romaji
            english
            native
          }
          coverImage {
            extraLarge
          }
          episodes
          chapters
          volumes
          type
          status
          nextAiringEpisode {
            episode
            timeUntilAiring
            airingAt
          }
          startDate {
            year
            month
            day
          }
        }
        status
        progress
        score
        repeat
        notes
        startedAt {
          year
          month
          day
        }
        completedAt {
          year
          month
          day
        }
        private
        hiddenFromStatusLists
        updatedAt
        createdAt
      }
    }
  }
}
