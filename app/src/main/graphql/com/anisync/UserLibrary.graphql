query GetUserLibrary($username: String!, $type: MediaType!) {
  MediaListCollection(userName: $username, type: $type) {
    lists {
      name
      entries {
        id
        media {
          id
          title {
            userPreferred
          }
          coverImage {
            extraLarge
          }
          episodes
          chapters
          volumes
          type
          nextAiringEpisode {
            episode
            timeUntilAiring
          }
          startDate {
            year
            month
            day
          }
        }
        status
        progress
        score
        updatedAt
        createdAt
      }
    }
  }
}
