query GetForumThread($id: Int!) {
  Thread(id: $id) {
    id
    title
    body
    replyCount
    viewCount
    likeCount
    isLiked
    isSubscribed
    isLocked
    createdAt
    updatedAt
    siteUrl
    user {
      id
      name
      avatar {
        large
      }
    }
    categories {
      id
      name
    }
  }
}

query GetThreadComments(
  $threadId: Int!,
  $page: Int = 1,
  $perPage: Int = 25
) {
  Page(page: $page, perPage: $perPage) {
    threadComments(threadId: $threadId) {
      id
      comment
      likeCount
      isLiked
      createdAt
      updatedAt
      siteUrl
      childComments
      user {
        id
        name
        avatar {
          large
        }
      }
    }
    pageInfo {
      hasNextPage
      currentPage
    }
  }
}
