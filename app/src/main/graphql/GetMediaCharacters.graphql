query GetMediaCharacters($id: Int, $page: Int, $perPage: Int) {
    Media(id: $id) {
        characters(sort: [ROLE, RELEVANCE], page: $page, perPage: $perPage) {
            pageInfo {
                currentPage
                hasNextPage
            }
            edges {
                role
                node {
                    id
                    name {
                        userPreferred
                        full
                        native
                    }
                    image {
                        large
                    }
                }
            }
        }
    }
}
