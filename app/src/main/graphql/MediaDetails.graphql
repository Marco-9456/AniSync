query GetMediaDetails($id: Int) {
  Media(id: $id) {
    id
    title {
      romaji
      english
    }
    coverImage {
      extraLarge
    }
    bannerImage
    description(asHtml: true)
    averageScore
    episodes
    chapters
    volumes
    type
    status
    format
    genres
    studios(isMain: true) {
      nodes {
        name
      }
    }
    startDate {
      year
    }
    mediaListEntry {
      id
      status
      progress
      score
    }
    characters(sort: [ROLE, RELEVANCE], perPage: 6) {
      edges {
        role
        node {
          id
          name {
            userPreferred
          }
          image {
            large
          }
        }
      }
    }
    relations {
      edges {
        relationType
        node {
          id
          title {
            userPreferred
          }
          format
          status
          coverImage {
            large
          }
        }
      }
    }
  }
}
