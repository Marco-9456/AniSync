query GetMediaDetails($id: Int) {
    Media(id: $id) {
        id
        title {
            romaji
            english
            native
            userPreferred
        }
        coverImage {
          medium
          large
          extraLarge
        }
        bannerImage
        description(asHtml: true)
        averageScore
        popularity
        favourites
        episodes
        duration
        nextAiringEpisode {
            episode
            airingAt
            timeUntilAiring
        }
        chapters
        volumes
        type
        status
        format
        source
        genres
        studios(isMain: true) {
            nodes {
                id
                name
            }
        }
        season
        startDate {
            year
            month
            day
        }
        endDate {
            year
            month
            day
        }
        trailer {
            id
            site
            thumbnail
        }
        tags {
            name
            category
            description
            isMediaSpoiler
            isGeneralSpoiler
            rank
        }
        mediaListEntry {
            id
            status
            progress
            score
            private
            hiddenFromStatusLists
        }
        characters(sort: [ROLE, RELEVANCE], perPage: 25) {
            edges {
                role
                node {
                    id
                    name {
                        userPreferred
                        full
                        native
                    }
                    image {
                        large
                    }
                }
            }
        }
        staff(sort: [RELEVANCE, ID], perPage: 25) {
            edges {
                role
                node {
                    id
                    name {
                        userPreferred
                        full
                        native
                    }
                    image {
                        large
                    }
                    primaryOccupations
                }
            }
        }
        relations {
            edges {
                relationType
                node {
                    id
                    title {
                        userPreferred
                        romaji
                        english
                        native
                    }
                    format
                    status
                    coverImage {
                      medium
                      large
                      extraLarge
                    }
                }
            }
        }
        externalLinks {
            id
            url
            site
            type
            color
            icon
            language
            notes
            isDisabled
        }
        recommendations(sort: [RATING_DESC], perPage: 10) {
            nodes {
                rating
                userRating
                mediaRecommendation {
                    id
                    title {
                        userPreferred
                        romaji
                        english
                        native
                    }
                    coverImage {
                      medium
                      large
                      extraLarge
                    }
                    format
                    averageScore
                }
            }
        }
        reviews(sort: [RATING_DESC], perPage: 5) {
            nodes {
                id
                summary
                body(asHtml: true)
                score
                rating
                ratingAmount
                userRating
                user {
                    name
                    avatar {
                        medium
                    }
                }
                createdAt
            }
        }
        isFavourite
    }
}
