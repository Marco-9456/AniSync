query GetMediaDetails($id: Int) {
  Media(id: $id) {
    id
    title {
      romaji
      english
    }
    coverImage {
      extraLarge
    }
    bannerImage
    description(asHtml: true)
    averageScore
    episodes
    chapters
    volumes
    type
    status
    format
    genres
    studios(isMain: true) {
      nodes {
        name
      }
    }
    season
    startDate {
      year
      month
      day
    }
    mediaListEntry {
      id
      status
      progress
      score
    }
    characters(sort: [ROLE, RELEVANCE], perPage: 25) {
      edges {
        role
        node {
          id
          name {
            userPreferred
          }
          image {
            large
          }
        }
      }
    }
    relations {
      edges {
        relationType
        node {
          id
          title {
            userPreferred
          }
          format
          status
          coverImage {
            large
          }
        }
      }
    }
    externalLinks {
      id
      url
      site
      type
      color
      icon
      language
      notes
      isDisabled
    }
  }
}
