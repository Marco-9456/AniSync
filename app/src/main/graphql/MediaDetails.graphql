query GetMediaDetails($id: Int) {
    Media(id: $id) {
        id
        title {
            romaji
            english
            native
            userPreferred
        }
        coverImage {
            extraLarge
        }
        bannerImage
        description(asHtml: true)
        averageScore
        episodes
        duration
        nextAiringEpisode {
            episode
        }
        chapters
        volumes
        type
        status
        format
        genres
        studios(isMain: true) {
            nodes {
                name
            }
        }
        season
        startDate {
            year
            month
            day
        }
        endDate {
            year
            month
            day
        }
        trailer {
            id
            site
            thumbnail
        }
        tags {
            name
            category
            isMediaSpoiler
            isGeneralSpoiler
            rank
        }
        mediaListEntry {
            id
            status
            progress
            score
        }
        characters(sort: [ROLE, RELEVANCE], perPage: 25) {
            edges {
                role
                node {
                    id
                    name {
                        userPreferred
                        full
                        native
                    }
                    image {
                        large
                    }
                }
            }
        }
        relations {
            edges {
                relationType
                node {
                    id
                    title {
                        userPreferred
                        romaji
                        english
                        native
                    }
                    format
                    status
                    coverImage {
                        large
                    }
                }
            }
        }
        externalLinks {
            id
            url
            site
            type
            color
            icon
            language
            notes
            isDisabled
        }
        isFavourite
    }
}
