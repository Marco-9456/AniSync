query GetMediaDetails($id: Int) {
  Media(id: $id) {
    id
    title {
      romaji
      english
    }
    coverImage {
      extraLarge
    }
    bannerImage
    description(asHtml: true)
    averageScore
    episodes
    status
    format
    genres
    studios(isMain: true) {
      nodes {
        name
      }
    }
    startDate {
      year
    }
    mediaListEntry {
      id
      status
      progress
      score
    }
  }
}
