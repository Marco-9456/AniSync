query GetLinkPreviews($mediaIds: [Int], $characterIds: [Int], $staffIds: [Int]) {
    mediaPage: Page(perPage: 25) {
        media(id_in: $mediaIds) {
            id
            title {
                userPreferred
            }
            coverImage {
              medium
              large
              extraLarge
            }
            type
        }
    }
    characterPage: Page(perPage: 25) {
        characters(id_in: $characterIds) {
            id
            name {
                userPreferred
            }
            image {
                large
            }
        }
    }
    staffPage: Page(perPage: 25) {
        staff(id_in: $staffIds) {
            id
            name {
                userPreferred
            }
            image {
                large
            }
        }
    }
}
