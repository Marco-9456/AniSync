query GetUserProfile($name: String) {
  User(name: $name) {
    name
    id
    avatar {
      large
    }
    bannerImage
    about
    updatedAt
    statistics {
      anime {
        count
        minutesWatched
        meanScore
        statuses {
          count
          status
        }
        genres(sort: [COUNT_DESC], limit: 5) {
          genre
          count
          meanScore
        }
      }
      manga {
        count
        chaptersRead
        meanScore
      }
    }
    favourites {
      anime(page: 1, perPage: 25) {
        pageInfo {
          hasNextPage
          total
        }
        nodes {
          id
          type
          status
          format
          episodes
          chapters
          volumes
          averageScore
          nextAiringEpisode {
            episode
            timeUntilAiring
            airingAt
          }
          title {
            userPreferred
            romaji
            english
            native
          }
          coverImage {
             large
             extraLarge
          }
        }
      }
      manga(page: 1, perPage: 5) {
        nodes {
          id
          type
          status
          format
          chapters
          volumes
          averageScore
          title {
            userPreferred
            romaji
            english
            native
          }
          coverImage {
            large
            extraLarge
          }
        }
      }
      characters(page: 1, perPage: 5) {
        nodes {
          id
          name {
            userPreferred
          }
          image {
            large
          }
        }
      }
      staff(page: 1, perPage: 5) {
        nodes {
          id
          name {
            userPreferred
          }
          image {
            large
          }
        }
      }
    }
  }
}

query GetUserFavorites($userId: Int, $page: Int) {
  User(id: $userId) {
    favourites {
      anime(page: $page, perPage: 50) {
        pageInfo {
          hasNextPage
          total
          lastPage
        }
        nodes {
          id
          type
          status
          format
          episodes
          chapters
          volumes
          averageScore
          nextAiringEpisode {
            episode
            timeUntilAiring
            airingAt
          }
          title {
            userPreferred
            romaji
            english
            native
          }
          coverImage {
             large
             extraLarge
          }
        }
      }
    }
  }
}

fragment ActivityFields on ActivityUnion {
  ... on ListActivity {
    id
    type
    status
    progress
    createdAt
    media {
      id
      title {
        userPreferred
        romaji
        english
        native
      }
      coverImage {
         medium
      }
      type
    }
  }
  ... on TextActivity {
    id
    type
    text
    createdAt
    user {
      id
      name
      avatar {
        medium
      }
    }
  }
  ... on MessageActivity {
    id
    type
    message
    createdAt
    messenger {
      id
      name
      avatar {
        medium
      }
    }
    recipient {
      id
      name
    }
  }
}

query GetUserActivities($userId: Int) {
  allActivities: Page(perPage: 50) {
    activities(userId: $userId, sort: [ID_DESC], type_in: [ANIME_LIST, MANGA_LIST, TEXT, MESSAGE]) {
      ...ActivityFields
    }
  }
  textActivities: Page(perPage: 20) {
    activities(userId: $userId, sort: [ID_DESC], type_in: [TEXT]) {
      ...ActivityFields
    }
  }
  messageReceived: Page(perPage: 20) {
    activities(userId: $userId, sort: [ID_DESC], type_in: [MESSAGE]) {
      ...ActivityFields
    }
  }
  messageSent: Page(perPage: 20) {
    activities(messengerId: $userId, sort: [ID_DESC], type_in: [MESSAGE]) {
      ...ActivityFields
    }
  }
}

mutation UpdateAbout($about: String) {
  UpdateUser(about: $about) {
    id
    about
  }
}
