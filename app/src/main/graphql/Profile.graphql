query GetUserProfile($name: String) {
  User(name: $name) {
    name
    id
    avatar {
      large
    }
    bannerImage
    about
    updatedAt
    statistics {
      anime {
        count
        minutesWatched
        meanScore
      }
      manga {
        count
        chaptersRead
        meanScore
      }
    }
    favourites {
      anime {
        nodes {
          id
          title {
            userPreferred
          }
          coverImage {
            large
          }
        }
      }
    }
  }
}

query GetUserActivities($userId: Int) {
  Page(perPage: 5) {
    activities(userId: $userId, sort: [ID_DESC], type: MEDIA_LIST) {
      ... on ListActivity {
        id
        type
        status
        progress
        createdAt
        media {
          id
          title {
            userPreferred
          }
          coverImage {
             medium
          }
          type
        }
      }
    }
  }
}

mutation UpdateAbout($about: String) {
  UpdateUser(about: $about) {
    id
    about
  }
}
