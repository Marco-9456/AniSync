query GetUserProfile($name: String) {
  User(name: $name) {
    name
    id
    avatar {
      large
    }
    bannerImage
    about
    updatedAt
    statistics {
      anime {
        count
        minutesWatched
        meanScore
        statuses {
          count
          status
        }
      }
      manga {
        count
        chaptersRead
        meanScore
      }
    }
    favourites {
      anime(page: 1, perPage: 25) {
        pageInfo {
          hasNextPage
          total
        }
        nodes {
          id
          type
          status
          format
          episodes
          chapters
          volumes
          averageScore
          nextAiringEpisode {
            episode
            timeUntilAiring
            airingAt
          }
          title {
            userPreferred
            romaji
            english
            native
          }
          coverImage {
             large
             extraLarge
          }
        }
      }
    }
  }
}

query GetUserFavorites($userId: Int, $page: Int) {
  User(id: $userId) {
    favourites {
      anime(page: $page, perPage: 50) {
        pageInfo {
          hasNextPage
          total
          lastPage
        }
        nodes {
          id
          type
          status
          format
          episodes
          chapters
          volumes
          averageScore
          nextAiringEpisode {
            episode
            timeUntilAiring
            airingAt
          }
          title {
            userPreferred
            romaji
            english
            native
          }
          coverImage {
             large
             extraLarge
          }
        }
      }
    }
  }
}

query GetUserActivities($userId: Int) {
  Page(perPage: 5) {
    activities(userId: $userId, sort: [ID_DESC], type: MEDIA_LIST) {
      ... on ListActivity {
        id
        type
        status
        progress
        createdAt
        media {
          id
          title {
            userPreferred
            romaji
            english
            native
          }
          coverImage {
             medium
          }
          type
        }
      }
    }
  }
}

mutation UpdateAbout($about: String) {
  UpdateUser(about: $about) {
    id
    about
  }
}
