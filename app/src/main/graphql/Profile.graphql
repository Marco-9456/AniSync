query GetUserProfile($name: String, $includeViewer: Boolean = false) {
  Viewer @include(if: $includeViewer) {
    id
    unreadNotificationCount
    mediaListOptions {
      scoreFormat
    }
  }
  User(name: $name) {
    name
    id
    avatar {
      large
    }
    bannerImage
    about(asHtml: true)
    aboutRaw: about(asHtml: false)
    updatedAt
    donatorTier
    donatorBadge
    moderatorRoles
    createdAt
    statistics {
      anime {
        count
        minutesWatched
        meanScore
        statuses {
          count
          status
        }
        genres(sort: [COUNT_DESC], limit: 5) {
          genre
          count
          meanScore
        }
      }
      manga {
        count
        chaptersRead
        meanScore
      }
    }
    favourites {
      anime(page: 1, perPage: 50) {
        pageInfo {
          hasNextPage
          total
          lastPage
        }
        nodes {
          id
          type
          status
          format
          episodes
          chapters
          volumes
          averageScore
          nextAiringEpisode {
            episode
            timeUntilAiring
            airingAt
          }
          title {
            userPreferred
            romaji
            english
            native
          }
          coverImage {
            medium
            large
            extraLarge
          }
        }
      }
      manga(page: 1, perPage: 25) {
        nodes {
          id
          type
          status
          format
          chapters
          volumes
          averageScore
          title {
            userPreferred
            romaji
            english
            native
          }
          coverImage {
            medium
            large
            extraLarge
          }
        }
      }
      characters(page: 1, perPage: 25) {
        nodes {
          id
          name {
            userPreferred
          }
          image {
            large
          }
        }
      }
      staff(page: 1, perPage: 25) {
        nodes {
          id
          name {
            userPreferred
          }
          image {
            large
          }
        }
      }
      studios(page: 1, perPage: 25) {
        nodes {
          id
          name
        }
      }
    }
  }
}

"""
Single-request profile fetch. Folds the former GetUserProfile + GetUserActivities
into one operation. Activity feeds are gated by `$includeActivities` so the
own-profile path (cached/known userId) gets everything in one round-trip, while
the target-by-name path (userId unknown until User resolves) sets it false and
issues GetUserActivities as a follow-up. Favourites are page-1 only here — the
rest is paginated lazily when the Favorites tab opens (no eager fan-out).
"""
query GetFullUserProfile(
  $userId: Int,
  $name: String,
  $includeViewer: Boolean = false,
  $includeActivities: Boolean = false
) {
  Viewer @include(if: $includeViewer) {
    id
    unreadNotificationCount
    mediaListOptions {
      scoreFormat
    }
  }
  User(id: $userId, name: $name) {
    name
    id
    avatar {
      large
    }
    bannerImage
    about(asHtml: true)
    aboutRaw: about(asHtml: false)
    updatedAt
    donatorTier
    donatorBadge
    moderatorRoles
    createdAt
    statistics {
      anime {
        count
        minutesWatched
        meanScore
        statuses {
          count
          status
        }
        genres(sort: [COUNT_DESC], limit: 5) {
          genre
          count
          meanScore
        }
      }
      manga {
        count
        chaptersRead
        meanScore
      }
    }
    favourites {
      anime(page: 1, perPage: 50) {
        pageInfo {
          hasNextPage
          total
          lastPage
        }
        nodes {
          id
          type
          status
          format
          episodes
          chapters
          volumes
          averageScore
          nextAiringEpisode {
            episode
            timeUntilAiring
            airingAt
          }
          title {
            userPreferred
            romaji
            english
            native
          }
          coverImage {
            medium
            large
            extraLarge
          }
        }
      }
      manga(page: 1, perPage: 25) {
        nodes {
          id
          type
          status
          format
          chapters
          volumes
          averageScore
          title {
            userPreferred
            romaji
            english
            native
          }
          coverImage {
            medium
            large
            extraLarge
          }
        }
      }
      characters(page: 1, perPage: 25) {
        nodes {
          id
          name {
            userPreferred
          }
          image {
            large
          }
        }
      }
      staff(page: 1, perPage: 25) {
        nodes {
          id
          name {
            userPreferred
          }
          image {
            large
          }
        }
      }
      studios(page: 1, perPage: 25) {
        nodes {
          id
          name
        }
      }
    }
  }
  allActivities: Page(perPage: 50) @include(if: $includeActivities) {
    activities(userId: $userId, sort: [PINNED, ID_DESC], type_in: [ANIME_LIST, MANGA_LIST, TEXT, MESSAGE]) {
      ...ActivityFields
    }
  }
  textActivities: Page(perPage: 20) @include(if: $includeActivities) {
    activities(userId: $userId, sort: [PINNED, ID_DESC], type_in: [TEXT]) {
      ...ActivityFields
    }
  }
  messageReceived: Page(perPage: 20) @include(if: $includeActivities) {
    activities(userId: $userId, sort: [ID_DESC], type_in: [MESSAGE]) {
      ...ActivityFields
    }
  }
  messageSent: Page(perPage: 20) @include(if: $includeActivities) {
    activities(messengerId: $userId, sort: [ID_DESC], type_in: [MESSAGE]) {
      ...ActivityFields
    }
  }
}

query GetUserFavorites($userId: Int, $page: Int) {
  User(id: $userId) {
    favourites {
      anime(page: $page, perPage: 50) {
        pageInfo {
          hasNextPage
          total
          lastPage
        }
        nodes {
          id
          type
          status
          format
          episodes
          chapters
          volumes
          averageScore
          nextAiringEpisode {
            episode
            timeUntilAiring
            airingAt
          }
          title {
            userPreferred
            romaji
            english
            native
          }
          coverImage {
            medium
            large
            extraLarge
          }
        }
      }
    }
  }
}

fragment ActivityFields on ActivityUnion {
    ... on ListActivity {
      id
      type
      status
      progress
      createdAt
      replyCount
      isLocked
      isSubscribed
      isLiked
      likeCount
      user {
        id
        name
        avatar {
          medium
        }
      }
      replies {
        id
        createdAt
        user {
          name
          avatar {
            medium
          }
        }
      }
      media {
      id
      title {
        userPreferred
        romaji
        english
        native
      }
      coverImage {
        medium
        large
        extraLarge
      }
      type
    }
  }
  ... on TextActivity {
    id
    type
    text(asHtml: true)
    textRaw: text(asHtml: false)
    createdAt
    likeCount
    replyCount
    isLiked
      isLocked
      isSubscribed
      isPinned
      replies {
        id
        createdAt
        user {
          name
          avatar {
            medium
          }
        }
      }
      user {
      id
      name
      avatar {
        medium
      }
    }
  }
  ... on MessageActivity {
    id
    type
    message(asHtml: true)
    rawMessage: message(asHtml: false)
    createdAt
    likeCount
    replyCount
    isLiked
      isPrivate
      isLocked
      isSubscribed
      replies {
        id
        createdAt
        user {
          name
          avatar {
            medium
          }
        }
      }
      messenger {
      id
      name
      moderatorRoles
      avatar {
        medium
      }
    }
    recipient {
      id
      name
      avatar {
        medium
      }
    }
  }
}

query GetUserActivities($userId: Int) {
  allActivities: Page(perPage: 50) {
    activities(userId: $userId, sort: [PINNED, ID_DESC], type_in: [ANIME_LIST, MANGA_LIST, TEXT, MESSAGE]) {
      ...ActivityFields
    }
  }
  textActivities: Page(perPage: 20) {
    activities(userId: $userId, sort: [PINNED, ID_DESC], type_in: [TEXT]) {
      ...ActivityFields
    }
  }
  messageReceived: Page(perPage: 20) {
    activities(userId: $userId, sort: [ID_DESC], type_in: [MESSAGE]) {
      ...ActivityFields
    }
  }
  messageSent: Page(perPage: 20) {
    activities(messengerId: $userId, sort: [ID_DESC], type_in: [MESSAGE]) {
      ...ActivityFields
    }
  }
}

mutation UpdateAbout($about: String) {
  UpdateUser(about: $about) {
    id
    about(asHtml: true)
  }
}
query GetUserSocialData($userId: Int!, $page: Int = 1) {
  following: Page(page: $page, perPage: 25) {
    pageInfo {
      hasNextPage
      total
    }
    following(userId: $userId) {
      id
      name
      avatar {
        large
      }
    }
  }
  followers: Page(page: $page, perPage: 25) {
    pageInfo {
      hasNextPage
      total
    }
    followers(userId: $userId) {
      id
      name
      avatar {
        large
      }
    }
  }
  threads: Page(page: $page, perPage: 15) {
    pageInfo {
      hasNextPage
      total
    }
    threads(userId: $userId, sort: ID_DESC) {
      id
      title
      replyCount
      viewCount
      likeCount
      isLiked
      isLocked
      isSticky
      isSubscribed
      createdAt
      updatedAt
      siteUrl
      replyCommentId
      categories {
        id
        name
      }
      user {
        id
        name
        avatar {
          large
        }
      }
      replyUser {
        id
        name
        avatar {
          large
        }
      }
      repliedAt
    }
  }
  comments: Page(page: $page, perPage: 15) {
    pageInfo {
      hasNextPage
      total
    }
    threadComments(userId: $userId, sort: ID_DESC) {
      id
      comment(asHtml: true)
      likeCount
      createdAt
      isLiked
      thread {
        id
        title
      }
      user {
        id
        name
        avatar {
          large
        }
      }
    }
  }
}

query GetUserReviews($userId: Int!, $page: Int = 1) {
  Page(page: $page, perPage: 20) {
    pageInfo {
      hasNextPage
      total
    }
    reviews(userId: $userId, sort: ID_DESC) {
      id
      summary
      body(asHtml: true)
      rating
      ratingAmount
      userRating
      score
      createdAt
      updatedAt
      media {
        id
        title {
          userPreferred
        }
        coverImage {
          medium
          large
          extraLarge
        }
        type
        bannerImage
      }
      user {
        id
        name
        avatar {
          large
        }
      }
    }
  }
}

query GetUserFollowState($userId: Int!) {
  User(id: $userId) {
    id
    isFollowing
  }
}

mutation ToggleUserFollow($userId: Int!) {
  ToggleFollow(userId: $userId) {
    id
    isFollowing
  }
}

mutation SaveMessageActivity(
  $id: Int,
  $recipientId: Int!,
  $message: String!,
  $private: Boolean = false
) {
  SaveMessageActivity(
    id: $id,
    recipientId: $recipientId,
    message: $message,
    private: $private
  ) {
    id
  }
}
