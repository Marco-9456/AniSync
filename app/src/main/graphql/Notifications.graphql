query GetNotifications(
  $page: Int = 1,
  $perPage: Int = 20,
  $typeIn: [NotificationType] = null,
  $resetCount: Boolean = true
) {
  Page(page: $page, perPage: $perPage) {
    pageInfo {
      hasNextPage
      currentPage
      total
    }
    notifications(type_in: $typeIn, resetNotificationCount: $resetCount) {
      ... on AiringNotification {
        id
        type
        episode
        contexts
        createdAt
        media {
          id
          title {
            userPreferred
          }
          coverImage {
            large
          }
          type
        }
      }
      ... on FollowingNotification {
        id
        type
        context
        createdAt
        user {
          id
          name
          avatar {
            large
          }
        }
      }
      ... on ActivityLikeNotification {
        id
        type
        activityId
        context
        createdAt
        user {
          id
          name
          avatar {
            large
          }
        }
        activity {
          __typename
          ... on TextActivity {
            id
            text(asHtml: true)
          }
          ... on ListActivity {
            id
            status
            progress
            media {
              id
              title { userPreferred }
              coverImage { large }
              type
            }
          }
          ... on MessageActivity {
            id
            message(asHtml: true)
          }
        }
      }
      ... on ActivityReplyNotification {
        id
        type
        activityId
        context
        createdAt
        user {
          id
          name
          avatar {
            large
          }
        }
        activity {
          __typename
          ... on TextActivity {
            id
            text(asHtml: true)
          }
          ... on ListActivity {
            id
            status
            progress
            media {
              id
              title { userPreferred }
              coverImage { large }
              type
            }
          }
          ... on MessageActivity {
            id
            message(asHtml: true)
          }
        }
      }
      ... on ActivityReplySubscribedNotification {
        id
        type
        activityId
        context
        createdAt
        user {
          id
          name
          avatar {
            large
          }
        }
        activity {
          __typename
          ... on TextActivity {
            id
            text(asHtml: true)
          }
          ... on ListActivity {
            id
            status
            progress
            media {
              id
              title { userPreferred }
              coverImage { large }
              type
            }
          }
          ... on MessageActivity {
            id
            message(asHtml: true)
          }
        }
      }
      ... on ActivityReplyLikeNotification {
        id
        type
        activityId
        context
        createdAt
        user {
          id
          name
          avatar {
            large
          }
        }
        activity {
          __typename
          ... on TextActivity {
            id
            text(asHtml: true)
          }
          ... on ListActivity {
            id
            status
            progress
            media {
              id
              title { userPreferred }
              coverImage { large }
              type
            }
          }
          ... on MessageActivity {
            id
            message(asHtml: true)
          }
        }
      }
      ... on ActivityMentionNotification {
        id
        type
        activityId
        context
        createdAt
        user {
          id
          name
          avatar {
            large
          }
        }
        activity {
          __typename
          ... on TextActivity {
            id
            text(asHtml: true)
          }
          ... on ListActivity {
            id
            status
            progress
            media {
              id
              title { userPreferred }
              coverImage { large }
              type
            }
          }
          ... on MessageActivity {
            id
            message(asHtml: true)
          }
        }
      }
      ... on ActivityMessageNotification {
        id
        type
        activityId
        context
        createdAt
        user {
          id
          name
          avatar {
            large
          }
        }
        message {
          id
          message(asHtml: true)
        }
      }
      ... on ThreadCommentReplyNotification {
        id
        type
        context
        createdAt
        user {
          id
          name
          avatar {
            large
          }
        }
        thread {
          id
          title
        }
        comment {
          id
          comment(asHtml: true)
        }
      }
      ... on ThreadCommentSubscribedNotification {
        id
        type
        context
        createdAt
        user {
          id
          name
          avatar {
            large
          }
        }
        thread {
          id
          title
        }
        comment {
          id
          comment(asHtml: true)
        }
      }
      ... on ThreadCommentMentionNotification {
        id
        type
        context
        createdAt
        user {
          id
          name
          avatar {
            large
          }
        }
        thread {
          id
          title
        }
        comment {
          id
          comment(asHtml: true)
        }
      }
      ... on ThreadLikeNotification {
        id
        type
        context
        createdAt
        user {
          id
          name
          avatar {
            large
          }
        }
        thread {
          id
          title
        }
      }
      ... on ThreadCommentLikeNotification {
        id
        type
        context
        createdAt
        user {
          id
          name
          avatar {
            large
          }
        }
        thread {
          id
          title
        }
        comment {
          id
          comment(asHtml: true)
        }
      }
      ... on RelatedMediaAdditionNotification {
        id
        type
        mediaId
        context
        createdAt
        media {
          id
          title {
            userPreferred
          }
          coverImage {
            large
          }
          type
        }
      }
      ... on MediaDataChangeNotification {
        id
        type
        mediaId
        context
        reason
        createdAt
        media {
          id
          title {
            userPreferred
          }
          coverImage {
            large
          }
          type
        }
      }
      ... on MediaMergeNotification {
        id
        type
        mediaId
        deletedMediaTitles
        context
        reason
        createdAt
        media {
          id
          title {
            userPreferred
          }
          coverImage {
            large
          }
          type
        }
      }
      ... on MediaDeletionNotification {
        id
        type
        deletedMediaTitle
        context
        reason
        createdAt
      }
    }
  }
}
