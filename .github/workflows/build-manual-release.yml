name: Build Manual Signed APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK (Manual)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.13

      - name: Decode Keystore
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          echo $SIGNING_KEY | base64 -d > ./app/release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleStableRelease

      - name: Resolve APK file names
        shell: bash
        run: |
          set -euo pipefail
          apk_dir="app/build/outputs/apk/stable/release"

          arm64_file="$(basename "$(ls "$apk_dir"/*-arm64-v8a-release.apk)")"
          armeabi_file="$(basename "$(ls "$apk_dir"/*-armeabi-v7a-release.apk)")"
          universal_file="$(basename "$(ls "$apk_dir"/*-universal-release.apk)")"
          x86_64_file="$(basename "$(ls "$apk_dir"/*-x86_64-release.apk)")"
          x86_file="$(basename "$(ls "$apk_dir"/*-x86-release.apk)")"

          {
            echo "APK_ARM64_FILE=$arm64_file"
            echo "APK_ARMEABI_FILE=$armeabi_file"
            echo "APK_UNIVERSAL_FILE=$universal_file"
            echo "APK_X86_64_FILE=$x86_64_file"
            echo "APK_X86_FILE=$x86_file"
          } >> "$GITHUB_ENV"

      - name: Upload arm64-v8a Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_ARM64_FILE }}
          path: app/build/outputs/apk/stable/release/${{ env.APK_ARM64_FILE }}
          if-no-files-found: error

      - name: Upload armeabi-v7a Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_ARMEABI_FILE }}
          path: app/build/outputs/apk/stable/release/${{ env.APK_ARMEABI_FILE }}
          if-no-files-found: error

      - name: Upload universal Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_UNIVERSAL_FILE }}
          path: app/build/outputs/apk/stable/release/${{ env.APK_UNIVERSAL_FILE }}
          if-no-files-found: error

      - name: Upload x86_64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_X86_64_FILE }}
          path: app/build/outputs/apk/stable/release/${{ env.APK_X86_64_FILE }}
          if-no-files-found: error

      - name: Upload x86 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_X86_FILE }}
          path: app/build/outputs/apk/stable/release/${{ env.APK_X86_FILE }}
          if-no-files-found: error
