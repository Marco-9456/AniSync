name: Build manual APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Debug is a non-upgrade test channel; release requires persistent signing secrets.'
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Set up Gradle from wrapper
        uses: gradle/actions/setup-gradle@v4

      - name: Require persistent signing for release
        if: inputs.build_type == 'release'
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SECRET_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SECRET_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SECRET_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          : "${SIGNING_KEY:?SIGNING_KEY is required}"
          : "${SECRET_KEYSTORE_PASSWORD:?KEYSTORE_PASSWORD is required}"
          : "${SECRET_KEY_ALIAS:?KEY_ALIAS is required}"
          : "${SECRET_KEY_PASSWORD:?KEY_PASSWORD is required}"
          keystore_file="$RUNNER_TEMP/release.keystore"
          printf '%s' "$SIGNING_KEY" | tr -d '[:space:]' | base64 --decode > "$keystore_file"
          keytool -list -v -keystore "$keystore_file" -storepass "$SECRET_KEYSTORE_PASSWORD" -alias "$SECRET_KEY_ALIAS" |
            sed -n '/SHA256:/p'
          echo "KEYSTORE_FILE=$keystore_file" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=$SECRET_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$SECRET_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=$SECRET_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build requested variant
        shell: bash
        env:
          BUILD_TYPE: ${{ inputs.build_type }}
        run: |
          set -euo pipefail
          rm -rf app/build anisyncplus-calendar/build
          if [[ "$BUILD_TYPE" == release ]]; then
            ./gradlew assembleStableRelease
          else
            ./gradlew assembleStableDebug
          fi

      - name: Select exact universal APK
        id: apk
        shell: bash
        env:
          BUILD_TYPE: ${{ inputs.build_type }}
        run: |
          set -euo pipefail
          mapfile -t apks < <(find "app/build/outputs/apk/stable/$BUILD_TYPE" -maxdepth 1 -type f -name "AniSyncPlus-*-universal-$BUILD_TYPE.apk" -print)
          [[ ${#apks[@]} -eq 1 ]] || { printf 'Expected one universal APK, found %s\n' "${#apks[@]}"; exit 1; }
          short_sha="${GITHUB_SHA::8}"
          channel="$BUILD_TYPE"
          [[ "$BUILD_TYPE" == release ]] || channel="debug-non-upgrade-channel"
          target="$RUNNER_TEMP/AniSyncPlus-${short_sha}-run${GITHUB_RUN_NUMBER}-${channel}.apk"
          cp "${apks[0]}" "$target"
          echo "path=$target" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: AniSyncPlus-${{ github.sha }}-run${{ github.run_number }}-${{ steps.apk.outputs.channel }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
