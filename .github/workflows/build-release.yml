name: Build signed tag release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Set up Gradle from wrapper
        uses: gradle/actions/setup-gradle@v4

      - name: Require and validate persistent signing secrets
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SECRET_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SECRET_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SECRET_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          : "${SIGNING_KEY:?SIGNING_KEY is required}"
          : "${SECRET_KEYSTORE_PASSWORD:?KEYSTORE_PASSWORD is required}"
          : "${SECRET_KEY_ALIAS:?KEY_ALIAS is required}"
          : "${SECRET_KEY_PASSWORD:?KEY_PASSWORD is required}"
          keystore_file="$RUNNER_TEMP/release.keystore"
          printf '%s' "$SIGNING_KEY" | tr -d '[:space:]' | base64 --decode > "$keystore_file"
          keytool -list -v -keystore "$keystore_file" -storepass "$SECRET_KEYSTORE_PASSWORD" -alias "$SECRET_KEY_ALIAS" |
            sed -n '/SHA256:/p'
          echo "KEYSTORE_FILE=$keystore_file" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=$SECRET_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$SECRET_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=$SECRET_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Remove prior outputs and build signed release
        run: |
          rm -rf app/build anisyncplus-calendar/build
          ./gradlew :anisyncplus-calendar:testDebugUnitTest testStableDebugUnitTest lintStableDebug assembleStableRelease

      - name: Select exact universal release APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t apks < <(find app/build/outputs/apk/stable/release -maxdepth 1 -type f -name 'AniSyncPlus-*-universal-release.apk' -print)
          [[ ${#apks[@]} -eq 1 ]] || { printf 'Expected one universal APK, found %s\n' "${#apks[@]}"; exit 1; }
          short_sha="${GITHUB_SHA::8}"
          target="$RUNNER_TEMP/AniSyncPlus-${short_sha}-run${GITHUB_RUN_NUMBER}-release.apk"
          cp "${apks[0]}" "$target"
          echo "path=$target" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: AniSyncPlus-${{ github.sha }}-run${{ github.run_number }}-release
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
          token: ${{ github.token }}
